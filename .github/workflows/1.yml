name: Fetch IPTV Logos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"  # Daily run

jobs:
  fetch-logos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          pip install requests pillow

      - name: Run Script
        run: python logo_fetcher.py

      - name: Commit & Push
        run: |
          git config --global user.name "logo-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add images/
          git commit -m "Updated IPTV logos" || echo "No changes"
          git push
